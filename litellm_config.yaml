# Configuration du serveur proxy
litellm_settings:
  # Activer les logs de debug (optionnel)
  # set_verbose: true

  # Timeout par défaut (en secondes)
  request_timeout: 600

  # Nombre maximum de requêtes parallèles
  num_workers: 4

  # Activer le cache (optionnel)
  # cache: true
  # cache_params:
  #   type: redis
  #   host: localhost
  #   port: 6379

# Configuration de sécurité
general_settings:
  # Clé master pour accéder au proxy
  # IMPORTANT: Changez cette clé en production !
  master_key: ${LITELLM_MASTER_KEY:-sk-litellm-master-key-changeme}

  # Autoriser toutes les origines (CORS)
  # En production, restreignez aux domaines autorisés
  allowed_origins: ["*"]

  # Database partagée avec ChatKit pour les logs et analytics
  # La variable DATABASE_URL est fournie par docker-compose avec le bon format Prisma
  database_url: ${DATABASE_URL}

  # Stocker les modèles en base de données
  store_model_in_db: true

  # Activer les métriques Prometheus (optionnel)
  # enable_prometheus: true

