name: Build Android APKs

on:
  push:
    paths:
      - 'wearos/**'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build watch APK first
        working-directory: wearos
        run: gradle :app:assembleDebug

      - name: Embed watch APK in phone assets
        run: |
          mkdir -p wearos/mobile/src/main/assets
          cp wearos/app/build/outputs/apk/debug/*.apk wearos/mobile/src/main/assets/edxo-voice-watch.apk

      - name: Build phone APK (with embedded watch APK)
        working-directory: wearos
        run: gradle :mobile:assembleDebug

      - name: Rename APKs
        run: |
          cp wearos/mobile/build/outputs/apk/debug/*.apk edxo-voice-phone.apk
          cp wearos/app/build/outputs/apk/debug/*.apk edxo-voice-watch.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: EDxo Voice v1.0.${{ github.run_number }}
          body: |
            ## EDxo Voice - Android

            **edxo-voice-phone.apk** - App telephone (peut installer l'app montre automatiquement)
            **edxo-voice-watch.apk** - App montre seule (si besoin)

            ### Installation
            1. Telecharger `edxo-voice-phone.apk` sur ton telephone
            2. Ouvrir le fichier et installer (activer "Sources inconnues" si demande)
            3. Ouvrir EDxo Voice, se connecter, choisir le workflow
            4. Appuyer sur "Installer sur la montre"
          files: |
            edxo-voice-phone.apk
            edxo-voice-watch.apk
