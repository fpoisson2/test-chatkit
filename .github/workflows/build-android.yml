name: Build Android APKs

on:
  push:
    paths:
      - 'wearos/**'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: wearos
        run: gradle wrapper --gradle-version 8.5

      - name: Build phone APK (includes watch app)
        working-directory: wearos
        run: ./gradlew :mobile:assembleDebug

      - name: Build watch-only APK
        working-directory: wearos
        run: ./gradlew :app:assembleDebug

      - name: Rename APKs
        run: |
          cp wearos/mobile/build/outputs/apk/debug/*.apk edxo-voice-phone.apk
          cp wearos/app/build/outputs/apk/debug/*.apk edxo-voice-watch.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: EDxo Voice v1.0.${{ github.run_number }}
          body: |
            ## EDxo Voice - Android

            **edxo-voice-phone.apk** - App telephone (installe aussi l'app montre automatiquement)
            **edxo-voice-watch.apk** - App montre seule (si besoin)

            ### Installation
            1. Telecharger `edxo-voice-phone.apk` sur ton telephone
            2. Ouvrir le fichier et installer (activer "Sources inconnues" si demande)
            3. L'app montre s'installe automatiquement sur la montre jumelee
            4. Ouvrir EDxo Voice sur le telephone, se connecter, choisir le workflow
          files: |
            edxo-voice-phone.apk
            edxo-voice-watch.apk
