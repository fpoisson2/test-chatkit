name: Build Android APKs

on:
  push:
    paths:
      - 'wearos/**'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: wearos
        run: gradle wrapper --gradle-version 8.5

      - name: Build phone APK (includes watch app)
        working-directory: wearos
        run: ./gradlew :mobile:assembleDebug

      - name: Build watch-only APK
        working-directory: wearos
        run: ./gradlew :app:assembleDebug

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: edxo-voice-phone
          path: wearos/mobile/build/outputs/apk/debug/*.apk

      - name: Upload watch APK
        uses: actions/upload-artifact@v4
        with:
          name: edxo-voice-watch
          path: wearos/app/build/outputs/apk/debug/*.apk
